<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NGSL 最重要英単語 2850 音読プレイヤー</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0d0f14;
    --surface: #161a24;
    --surface2: #1e2435;
    --accent: #4fffb0;
    --accent2: #00cfff;
    --text: #e8eaf0;
    --muted: #6b7694;
    --en-color: #4fffb0;
    --jp-color: #00cfff;
    --pos-color: #ff9f43;
    --border: #2a3050;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    width: 100%;
    padding: 18px 24px 14px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  header h1 {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  header span {
    font-size: 12px;
    color: var(--muted);
  }

  .main {
    width: 100%;
    max-width: 700px;
    padding: 28px 20px 120px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* Range Selector */
  .range-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
  }

  .range-card label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    display: block;
    margin-bottom: 10px;
  }

  .range-inputs {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .range-inputs select, .range-inputs input {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 12px;
    border-radius: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    cursor: pointer;
  }

  .range-inputs select:focus, .range-inputs input:focus {
    outline: none;
    border-color: var(--accent);
  }

  .range-inputs span { color: var(--muted); font-size: 13px; }

  .btn-set {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 7px 16px;
    border-radius: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 1px;
    transition: opacity 0.15s;
  }
  .btn-set:hover { opacity: 0.85; }

  /* Word Display Card */
  .word-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 28px 24px;
    position: relative;
    overflow: hidden;
  }

  .word-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }

  .word-number {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    margin-bottom: 16px;
  }

  .word-en {
    font-family: 'Space Mono', monospace;
    font-size: 38px;
    font-weight: 700;
    color: var(--en-color);
    line-height: 1.1;
    margin-bottom: 6px;
    letter-spacing: -1px;
    transition: opacity 0.2s;
  }

  .word-pos {
    font-size: 12px;
    color: var(--pos-color);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 10px;
  }

  .word-jp {
    font-size: 20px;
    color: var(--jp-color);
    font-weight: 700;
    margin-bottom: 20px;
  }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 18px 0;
  }

  .example-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 10px;
  }

  .example-en {
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    color: var(--en-color);
    line-height: 1.6;
    margin-bottom: 8px;
  }

  .example-jp {
    font-size: 14px;
    color: var(--jp-color);
    line-height: 1.7;
  }

  /* Reading State Indicator */
  .reading-state {
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 1px;
    min-height: 18px;
    margin-top: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .dot-pulse {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 1s infinite;
    display: none;
  }
  .reading-state.active .dot-pulse { display: block; }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  /* Progress */
  .progress-bar-wrap {
    background: var(--surface2);
    border-radius: 4px;
    height: 4px;
    width: 100%;
    margin-top: 18px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 4px;
    transition: width 0.3s ease;
  }

  .progress-text {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-align: right;
    margin-top: 6px;
  }

  /* Settings */
  .settings-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    align-items: center;
  }

  .setting-item {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .setting-item label {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .setting-item select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--accent);
    padding: 6px 10px;
    border-radius: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    min-width: 80px;
    outline: none;
  }

  .setting-item select:focus {
    border-color: var(--accent);
  }

  .setting-item input[type=range] {
    accent-color: var(--accent);
    width: 80px;
    cursor: pointer;
  }

  .setting-item .val {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    min-width: 30px;
  }

  .setting-item input[type=number] {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 5px 10px;
    border-radius: 6px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    width: 65px;
  }

  /* Controls */
  .controls {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    background: rgba(13,15,20,0.96);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    padding: 16px 20px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    z-index: 20;
  }

  .controls-row {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
  }

  .ctrl-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 20px;
    border-radius: 50px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }

  .ctrl-btn:hover { border-color: var(--accent); color: var(--accent); }

  .ctrl-btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
    font-weight: 700;
    padding: 10px 28px;
  }
  .ctrl-btn.primary:hover { opacity: 0.85; color: #000; }

  .ctrl-btn.danger {
    border-color: #ff4757;
    color: #ff4757;
  }
  .ctrl-btn.danger:hover { background: #ff4757; color: #fff; }

  .current-info {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  /* highlight active reading item */
  .highlight {
    background: rgba(79,255,176,0.12);
    border-radius: 6px;
    padding: 2px 6px;
    transition: background 0.3s;
  }

  /* Loop toggle */
  .toggle-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    user-select: none;
  }

  .toggle-wrap input[type=checkbox] {
    accent-color: var(--accent);
    width: 14px;
    height: 14px;
    cursor: pointer;
  }

  @media (max-width: 480px) {
    .word-en { font-size: 28px; }
    .word-jp { font-size: 17px; }
    .example-en, .example-jp { font-size: 13px; }
    .main { padding: 20px 12px 140px; }
  }
</style>
</head>

// ===== STATE =====
let playlist = [...ALL_DATA]; // current filtered/shuffled list
let currentIdx = 0;
let isPlaying = false;

// ===== RANGE =====
function applyRange() {
  const from = parseInt(document.getElementById('rangeFrom').value);
  const to = parseInt(document.getElementById('rangeTo').value);
  playlist = ALL_DATA.filter(w => w[0] >= from && w[0] <= to);
  if (document.getElementById('shuffleChk').checked) shufflePlaylist();
  currentIdx = 0;
  showWord(0);
  document.getElementById('rangeInfo').textContent = `${playlist.length}単語`;
  stopAll();
}

function shufflePlaylist() {
  for (let i = playlist.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [playlist[i], playlist[j]] = [playlist[j], playlist[i]];
  }
}

// ===== DISPLAY =====
function showWord(idx) {
  if (!playlist.length) return;
  const w = playlist[idx];
  document.getElementById('wordNumber').textContent = `No. ${w[0]} — ${idx + 1} / ${playlist.length}`;
  document.getElementById('wordEn').textContent = w[1];
  document.getElementById('wordPos').textContent = w[2];
  document.getElementById('wordJp').textContent = w[3];
  document.getElementById('exampleEn').textContent = w[4];
  document.getElementById('exampleJp').textContent = w[5];
  document.getElementById('currentInfo').textContent = `No.${w[0]} — ${w[1]}`;
  const pct = playlist.length > 1 ? (idx / (playlist.length - 1)) * 100 : 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${idx + 1} / ${playlist.length}`;
}

function setReadingState(text, active) {
  const el = document.getElementById('readingState');
  document.getElementById('stateText').textContent = text;
  el.classList.toggle('active', active);
}

// ===== SPEED =====
function getSpeedJP() { return parseFloat(document.getElementById('speedJP').value); }
function getSpeedEN() { return parseFloat(document.getElementById('speedEN').value); }
function getPauseMs() { return parseInt(document.getElementById('pauseMs').value) || 600; }

// ===== SESSION-BASED TTS ENGINE =====
// Each play/resume gets a new sessionId. Every async callback checks its
// captured sid against the current sessionId — if different, it's stale and ignored.
// This completely prevents the multi-read bug caused by lingering callbacks.
let sessionId = 0;

function speak(text, lang, sid, onEnd) {
  if (sid !== sessionId) return;
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = lang;
  utter.rate = (lang === 'ja-JP') ? getSpeedJP() : getSpeedEN();
  utter.onend = () => { if (sid === sessionId) onEnd(); };
  utter.onerror = (e) => {
    // 'interrupted' fires when speechSynthesis.cancel() is called — not a real error
    if (e.error !== 'interrupted' && sid === sessionId) onEnd();
  };
  speechSynthesis.speak(utter);
}

function wait(ms, sid, cb) {
  setTimeout(() => { if (sid === sessionId) cb(); }, ms);
}

// ===== STEP-QUEUE PLAYBACK =====
// Flat array of {type:'speak'|'pause', ...} steps, executed sequentially.
function buildSteps(w) {
  const p = getPauseMs();
  return [
    // Word ×1
    {type:'speak', text:w[3], lang:'ja-JP', label:'🇯🇵 意味 (1/2)'},
    {type:'pause', ms:p},
    {type:'speak', text:w[2], lang:'ja-JP', label:'📝 品詞 (1/2)'},
    {type:'pause', ms:p},
    {type:'speak', text:w[1], lang:'en-US', label:'🇺🇸 English (1/2)'},
    {type:'pause', ms:Math.round(p * 1.5)},
    // Word ×2
    {type:'speak', text:w[3], lang:'ja-JP', label:'🇯🇵 意味 (2/2)'},
    {type:'pause', ms:p},
    {type:'speak', text:w[2], lang:'ja-JP', label:'📝 品詞 (2/2)'},
    {type:'pause', ms:p},
    {type:'speak', text:w[1], lang:'en-US', label:'🇺🇸 English (2/2)'},
    {type:'pause', ms:p * 2},
    // Example ×1
    {type:'speak', text:w[5], lang:'ja-JP', label:'🇯🇵 例文 (1/2)'},
    {type:'pause', ms:p},
    {type:'speak', text:w[4], lang:'en-US', label:'🇺🇸 例文 (1/2)'},
    {type:'pause', ms:Math.round(p * 1.5)},
    // Example ×2
    {type:'speak', text:w[5], lang:'ja-JP', label:'🇯🇵 例文 (2/2)'},
    {type:'pause', ms:p},
    {type:'speak', text:w[4], lang:'en-US', label:'🇺🇸 例文 (2/2)'},
    {type:'pause', ms:p * 2},
  ];
}

function runSteps(steps, i, sid, onDone) {
  if (sid !== sessionId) return;
  if (i >= steps.length) { onDone(); return; }
  const s = steps[i];
  if (s.label) setReadingState(s.label, true);
  if (s.type === 'speak') {
    speak(s.text, s.lang, sid, () => runSteps(steps, i + 1, sid, onDone));
  } else {
    wait(s.ms, sid, () => runSteps(steps, i + 1, sid, onDone));
  }
}

function playWord(idx, sid, onDone) {
  if (sid !== sessionId || idx >= playlist.length) { onDone(); return; }
  const w = playlist[idx];
  showWord(idx);
  currentIdx = idx;
  runSteps(buildSteps(w), 0, sid, () => {
    setReadingState('✓ DONE', false);
    onDone();
  });
}

function playFrom(idx) {
  const sid = sessionId; // capture current session
  if (idx >= playlist.length) {
    if (document.getElementById('loopChk').checked) {
      if (document.getElementById('shuffleChk').checked) { shufflePlaylist(); }
      showWord(0);
      playFrom(0);
    } else {
      isPlaying = false;
      document.getElementById('playBtn').textContent = '▶ PLAY';
      setReadingState('✓ COMPLETE', false);
    }
    return;
  }
  playWord(idx, sid, () => {
    if (sid === sessionId && isPlaying) playFrom(idx + 1);
  });
}

function togglePlay() {
  if (isPlaying) {
    isPlaying = false;
    sessionId++; // invalidate all pending callbacks instantly
    speechSynthesis.cancel();
    document.getElementById('playBtn').textContent = '▶ PLAY';
    setReadingState('PAUSED', false);
  } else {
    isPlaying = true;
    sessionId++; // new clean session
    document.getElementById('playBtn').textContent = '⏸ PAUSE';
    setReadingState('...', true);
    playFrom(currentIdx);
  }
}

function stopAll() {
  isPlaying = false;
  sessionId++; // kills all pending callbacks
  speechSynthesis.cancel();
  document.getElementById('playBtn').textContent = '▶ PLAY';
  setReadingState('STOPPED', false);
}

function prevWord() {
  const wasPlaying = isPlaying;
  isPlaying = false;
  sessionId++;
  speechSynthesis.cancel();
  currentIdx = Math.max(0, currentIdx - 1);
  showWord(currentIdx);
  document.getElementById('playBtn').textContent = '▶ PLAY';
  if (wasPlaying) { isPlaying = true; sessionId++; document.getElementById('playBtn').textContent = '⏸ PAUSE'; playFrom(currentIdx); }
}

function nextWord() {
  const wasPlaying = isPlaying;
  isPlaying = false;
  sessionId++;
  speechSynthesis.cancel();
  currentIdx = Math.min(playlist.length - 1, currentIdx + 1);
  showWord(currentIdx);
  document.getElementById('playBtn').textContent = '▶ PLAY';
  if (wasPlaying) { isPlaying = true; sessionId++; document.getElementById('playBtn').textContent = '⏸ PAUSE'; playFrom(currentIdx); }
}

// ===== INIT =====
function init() {
  applyRange();
  showWord(0);
}

init();
</script>
